project:
  name: MarketFlow
  description: Real-time stock index dashboard
  structure:
    - rust-backend/:
        description: Default Rust API and Socket.io-compatible market data server
        src/:
          - main.rs: Rust backend CLI entry point
          - server.rs: axum REST API, Socket.io push, 30s refresh loop, cache, and quant proxy
          - fetcher.rs: Tencent Finance API parser and data models
          - lib.rs: Rust library module exports
        - Cargo.toml: Rust backend dependencies and package metadata
        - Cargo.lock: Locked Rust dependency graph
        - README.md: Rust backend operation notes
    - backend/:
        description: Legacy NestJS API and WebSocket server retained for rollback
        src/:
          - main.ts: Backend entry point (port 3001)
          - app.module.ts: Root application module
          - indices/:
              description: Market data logic & fetching
              - fetcher.ts: Legacy Tencent Finance API parser
              - indices.service.ts: Data lifecycle & 30s refresh loop
              - indices.controller.ts: REST API endpoints
          - websocket/:
              description: Real-time communication via Socket.io
              - adapter.ts: Custom Socket.io adapter
              - events.service.ts: Internal pub/sub bridge
              - indices.gateway.ts: WebSocket hub for client updates
    - frontend/:
        description: Next.js dashboard
        app/:
          - layout.tsx: Root layout
          - page.tsx: Main dashboard container & live state management
          - globals.css: Dark mode UI styles
        components/:
          - IndexCard.tsx: Individual index summary component
          - IndexDetailModal.tsx: Detailed modal with custom SVG charts
    - quant/:
        description: Python FastAPI quantitative analysis service
        - app.py: Quant service API with health, strategy, and signal endpoints
        - pyproject.toml: Python service metadata and uv-managed dependencies
    - .skills/:
        description: Standardized agent workflow instructions
        - architecture.md: Deep dive into system design
        - add-new-index.md: Steps for adding new market indices
        - deploy.md: Production deployment guide
        - TEMPLATE.md: Standard skill format
    - package.json: Root scripts for setup and concurrent development
    - .mise.toml: Pinned Node/Rust/Python/uv versions and local development tasks
    - AGENTS.md: Developer/Agent guidelines
    - README.md: Main project documentation
