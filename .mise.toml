[tools]
node = "20"
python = "3.12"
rust = "1.94"
uv = "latest"

[tasks.setup]
description = "Install frontend/root dependencies, sync quant with uv, and fetch Rust backend crates"
run = "npm run setup"

[tasks.dev]
description = "Run frontend, backend, and quant service together"
run = "npm run dev"

[tasks.build]
description = "Build the Rust backend and frontend"
run = [
  "cd rust-backend && cargo build --release",
  "cd frontend && npm run build",
]

[tasks.check]
description = "Run lightweight validation for all services"
run = [
  "cd rust-backend && cargo test",
  "cd frontend && npm run build",
  "cd quant && PYTHONPYCACHEPREFIX=/tmp/marketflow-pycache uv run python -m py_compile app.py",
]
