<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #e94560;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .card-title {
      font-size: 16px;
      color: #888;
      margin-bottom: 12px;
    }
    .card-price {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-change {
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .up { color: #e94560; }
    .down { color: #2ecc71; }
    .card-meta {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a2a4a;
      font-size: 14px;
      color: #666;
    }
    .volume { float: right; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #e94560;
    }
    .refresh-btn {
      display: block;
      margin: 20px auto;
      padding: 12px 24px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 0.9; }
    .time { text-align: center; color: #666; margin-top: 20px; font-size: 14px; }
    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 4px solid #e94560;
      color: #fff;
    }
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📈 大盘</h1>
  </div>
  <button class="refresh-btn" onclick="loadData()">刷新数据</button>
  <div id="app"></div>
  <div class="time">更新时间: <span id="time">-</span></div>

  <script>
    async function loadData() {
      const app = document.getElementById('app');
      app.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch('/api/indices');
        const json = await res.json();

        if (!json.success) {
          app.innerHTML = '<div class="error">获取数据失败</div>';
          return;
        }

        renderCards(json.data);
      } catch (e) {
        app.innerHTML = '<div class="error">网络错误</div>';
      }
    }

    function renderCards(data) {
      const app = document.getElementById('app');

      const categories = {
        'A股': ['sh000001', 'sz399001', 'sh000688', 'sz399006'],
        '港股': ['hkHSI'],
        '美股': ['usNDX', 'usINX']
      };

      const codeToCategory = {};
      for (const [cat, codes] of Object.entries(categories)) {
        codes.forEach(code => codeToCategory[code] = cat);
      }

      const byCategory = {};
      for (const item of data) {
        const cat = codeToCategory[item.code] || '其他';
        if (!byCategory[cat]) byCategory[cat] = [];
        byCategory[cat].push(item);
      }

      const catNames = ['A股', '港股', '美股'];
      app.innerHTML = catNames.filter(c => byCategory[c]).map(cat => {
        const items = byCategory[cat];
        return `
          <div class="section">
            <div class="section-title">${cat}</div>
            <div class="section-grid">
              ${items.map(item => renderCard(item)).join('')}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('time').textContent = new Date().toLocaleTimeString();
    }

    function renderCard(item) {
      const isUp = item.change >= 0;
      const cls = isUp ? 'up' : 'down';
      const sign = isUp ? '+' : '';
      const vol = formatVolume(item.volume);

      return `
        <div class="card">
          <div class="card-title">${item.name}</div>
          <div class="card-price">${item.price.toFixed(2)}</div>
          <div class="card-change ${cls}">
            <span>${sign}${item.change.toFixed(2)}</span>
            <span>(${sign}${item.changePercent.toFixed(2)}%)</span>
          </div>
          <div class="card-meta">
            成交量 <span class="volume">${vol}</span>
          </div>
        </div>
      `;
    }

    function formatVolume(v) {
      if (!v) return '-';
      if (v >= 100000000) return (v / 100000000).toFixed(2) + '亿';
      if (v >= 10000) return (v / 10000).toFixed(2) + '万';
      return v.toFixed(0);
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
